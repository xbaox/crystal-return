<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="color-scheme" content="dark">
<title>Crystal VPN — возврат в бот</title>

<!--
  Страница-мост для возврата после оплаты ЮKassa (Crystal VPN, Этап 1;
  Этап 5: единый бренд — фирменные шрифты, чистый край без синей полосы;
  UX §3: текст согласован с фиксом A3 — НЕ обещаем жёстко «ключ придёт сам»,
  ведём к кнопке «🔄 Проверить оплату» в боте; токены цвета = chart_theme.py).
  Кнопка банка «Вернуться в магазин» ведёт сюда; страница сразу пытается
  открыть приложение через tg://resolve, а если не вышло за ~1.4 с — показывает
  крупную кнопку и успокаивающий текст. Только HTML/CSS/JS, без внешних запросов
  и секретов: должна открываться мгновенно и работать при плохой сети.

  Username бота зашит ниже (Crysta1_VPNbot) в двух местах: в href кнопки и в
  DEFAULT_BOT в скрипте. Можно переопределить через ?bot=ИмяБота — у query
  приоритет. Деплой: любой статик-хостинг (GitHub Pages, Cloudflare Pages,
  nginx). Подробности — в сообщении ассистента, не в этом файле.
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  /* Единый бренд-токен с ботом: значения = utils/chart_theme.py (та же палитра,
     что у графиков и картинки-чека — весь визуал читается как один бренд):
       --bg-0   #0e1621 = BG          --card-1  #17212b = PLOT_BG
       --border #243446 = SPINE       --text    #ffffff = TEXT
       --muted  #8fa3b5 = TEXT_MUTED  --accent  #3da5ff = ACCENT
       --accent-2 #7cc4ff = ACCENT_LIGHT (светлая грань кристалла)
     Меняешь палитру бота — поправь и здесь (и наоборот). */
  :root{
    --bg-0:#0e1621; --bg-1:#0b121b; --card-0:#1a2734; --card-1:#17212b;
    --border:#243446; --text:#ffffff; --muted:#8fa3b5;
    --accent:#3da5ff; --accent-2:#7cc4ff; --ink:#04243f;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; position:relative; overflow:hidden;
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--text);
    background:
      radial-gradient(1200px 600px at 50% -12%, #1b2a3a 0%, rgba(27,42,58,0) 58%),
      linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 100%);
    display:flex; align-items:center; justify-content:center; padding:24px;
    -webkit-font-smoothing:antialiased;
  }
  /* Амбиентное «сияние», медленно дрейфующее за карточкой */
  body::before{
    content:""; position:absolute; width:560px; height:560px; left:50%; top:42%;
    margin:-280px 0 0 -280px; border-radius:50%; pointer-events:none; z-index:0;
    background:radial-gradient(closest-side, rgba(61,165,255,.20), rgba(61,165,255,0) 70%);
    filter:blur(18px); animation:auroraDrift 14s ease-in-out infinite alternate;
  }

  .card{
    position:relative; z-index:1; width:100%; max-width:420px;
    background:linear-gradient(180deg, var(--card-0) 0%, var(--card-1) 100%);
    border:1px solid var(--border); border-radius:24px;
    padding:40px 28px 28px; text-align:center; overflow:hidden;
    box-shadow:inset 0 1px 0 rgba(124,196,255,.16), 0 24px 60px rgba(0,0,0,.45);
    animation:cardIn .65s cubic-bezier(.2,.7,.2,1) both;
  }
  /* Чистый симметричный край: вместо синей полосы поверх рамки — лёгкий
     внутренний световой блик по верхнему краю (inset, уважает скругление со
     всех сторон). Тот же приём, что у карточки чека и доков. */

  /* --- Гем: фирменный кристалл-герой со свечением, бликом и искрами --- */
  .gem-wrap{
    position:relative; width:74px; height:74px; margin:2px auto 18px;
    animation:gemFloat 4.2s ease-in-out infinite;
  }
  .gem-glow{
    position:absolute; inset:-16%; border-radius:50%; z-index:0; pointer-events:none;
    background:radial-gradient(closest-side, rgba(61,165,255,.6), rgba(61,165,255,0) 70%);
    filter:blur(8px); animation:gemGlow 3s ease-in-out infinite;
  }
  .gem{
    position:relative; z-index:1; width:74px; height:74px; display:block;
    animation:gemPop .7s cubic-bezier(.2,.8,.25,1.3) both; animation-delay:.12s;
  }
  .gem .facet-top{animation:facetTwinkle 2.6s ease-in-out infinite}
  /* Световой блик, едущий по силуэту кристалла */
  .gem-shine{
    position:absolute; inset:0; z-index:2; pointer-events:none; overflow:hidden;
    clip-path:polygon(26% 12%, 74% 12%, 90% 44%, 50% 84%, 10% 44%);
  }
  .gem-shine::before{
    content:""; position:absolute; top:-20%; left:0; width:60%; height:140%;
    background:linear-gradient(100deg, transparent, rgba(255,255,255,.55), transparent);
    transform:translateX(-200%) skewX(-18deg);
    animation:gemSweep 3.6s ease-in-out infinite; animation-delay:1s;
  }
  .spark{
    position:absolute; width:11px; height:11px; z-index:3; opacity:0; pointer-events:none;
    background:linear-gradient(180deg,#ffffff,#bfe3ff);
    clip-path:polygon(50% 0,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
    animation:twinkle 2.4s ease-in-out infinite;
  }
  .spark.s1{top:-6px; right:2px; animation-delay:.6s}
  .spark.s2{bottom:2px; left:-4px; width:8px; height:8px; animation-delay:1.5s}
  .spark.s3{top:30px; right:-8px; width:7px; height:7px; animation-delay:2.1s}

  .badge{
    display:inline-flex; align-items:center; gap:8px;
    font-family:"JetBrains Mono",monospace;
    font-size:12.5px; font-weight:500; letter-spacing:.02em; color:var(--accent-2);
    background:rgba(61,165,255,.10); border:1px solid rgba(61,165,255,.30);
    padding:6px 12px; border-radius:999px; margin-bottom:16px;
    animation:riseIn .55s ease both; animation-delay:.18s;
  }
  h1{
    font-family:"Space Grotesk","Inter",sans-serif;
    font-size:23px; line-height:1.25; margin:0 0 10px; font-weight:700;
    animation:riseIn .55s ease both; animation-delay:.26s;
  }
  .lead{
    font-size:15.5px; line-height:1.55; color:var(--muted); margin:0 auto 22px; max-width:330px;
    animation:riseIn .55s ease both; animation-delay:.34s;
  }
  .hint{
    display:flex; align-items:center; justify-content:center; gap:11px;
    min-height:26px; margin-bottom:18px;
    animation:riseIn .55s ease both; animation-delay:.42s;
  }
  .hint span{font-size:13.5px; color:var(--muted)}
  .dots{display:inline-flex; gap:6px}
  .dots i{
    width:8px; height:8px; border-radius:50%; background:var(--accent); display:inline-block;
    animation:dotBounce 1.25s ease-in-out infinite;
  }
  .dots i:nth-child(2){animation-delay:.16s}
  .dots i:nth-child(3){animation-delay:.32s}

  .btn{
    position:relative; overflow:hidden; display:block; width:100%;
    background:linear-gradient(180deg, var(--accent-2) 0%, var(--accent) 100%);
    color:var(--ink); text-decoration:none; font-size:17px; font-weight:700;
    padding:16px 18px; border-radius:16px;
    box-shadow:0 10px 24px rgba(61,165,255,.35);
    transition:transform .08s ease, box-shadow .25s ease, opacity .3s ease;
    animation:riseIn .55s ease both; animation-delay:.5s;
    opacity:.55;
  }
  .btn::after{
    content:""; position:absolute; top:0; left:0; width:42%; height:100%;
    background:linear-gradient(100deg, transparent, rgba(255,255,255,.5), transparent);
    transform:translateX(-220%) skewX(-18deg);
  }
  .btn:active{transform:translateY(1px)}
  #cta.ready{opacity:1; animation:btnPulse 1.8s ease-in-out 2}
  #cta.ready::after{animation:btnShine 1.05s ease-out .05s 1}

  .foot{
    margin-top:20px; font-family:"JetBrains Mono",monospace; font-size:12px; color:#5e7387;
    animation:riseIn .55s ease both; animation-delay:.58s;
  }
  .foot b{color:#9fb3c5; font-weight:600}

  @keyframes auroraDrift{
    0%{transform:translate(-34px,-12px) scale(1)}
    100%{transform:translate(34px,16px) scale(1.12)}
  }
  @keyframes cardIn{from{opacity:0; transform:translateY(18px) scale(.985)} to{opacity:1; transform:none}}
  @keyframes riseIn{from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:none}}
  @keyframes gemPop{from{opacity:0; transform:scale(.78)} to{opacity:1; transform:scale(1)}}
  @keyframes gemFloat{0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)}}
  @keyframes gemGlow{0%,100%{opacity:.45; transform:scale(.92)} 50%{opacity:.85; transform:scale(1.08)}}
  @keyframes gemSweep{0%{transform:translateX(-200%) skewX(-18deg)} 55%{transform:translateX(330%) skewX(-18deg)} 100%{transform:translateX(330%) skewX(-18deg)}}
  @keyframes facetTwinkle{0%,100%{fill-opacity:1} 50%{fill-opacity:.72}}
  @keyframes twinkle{0%,100%{opacity:0; transform:scale(.2) rotate(0deg)} 50%{opacity:.95; transform:scale(1) rotate(40deg)}}
  @keyframes dotBounce{0%,80%,100%{transform:translateY(0); opacity:.4} 40%{transform:translateY(-6px); opacity:1}}
  @keyframes btnShine{to{transform:translateX(330%) skewX(-18deg)}}
  @keyframes btnPulse{0%,100%{box-shadow:0 10px 24px rgba(61,165,255,.35)} 50%{box-shadow:0 14px 36px rgba(61,165,255,.66)}}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important}
    body::before, .gem-glow, .gem-shine, .spark{display:none}
    #cta{opacity:1}
  }
</style>
</head>
<body>
  <main class="card" role="main">
    <div class="gem-wrap">
      <span class="gem-glow"></span>
      <svg class="gem" viewBox="0 0 100 100" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
        <polygon points="10,44 90,44 50,84" fill="#348ee0"/>
        <polygon points="26,12 74,12 90,44 10,44" fill="#3da5ff"/>
        <polygon class="facet-top" points="26,12 74,12 50,44" fill="#7cc4ff"/>
        <polygon points="26,12 50,44 10,44" fill="#3da5ff"/>
        <polygon points="74,12 90,44 50,44" fill="#3da5ff"/>
        <polygon points="10,44 50,44 50,84" fill="#2f86d6"/>
      </svg>
      <span class="gem-shine"></span>
      <i class="spark s1"></i>
      <i class="spark s2"></i>
      <i class="spark s3"></i>
    </div>

    <div class="badge">💎 Crystal VPN</div>

    <h1>Возвращаемся в Telegram…</h1>
    <p class="lead">Если оплата прошла — ключ придёт в чат. Не пришёл?
       Открой бота и жми «🔄 Проверить оплату».</p>

    <div class="hint" id="hint">
      <span class="dots" id="dots" aria-hidden="true"><i></i><i></i><i></i></span>
      <span id="hint-text">Открываю Telegram…</span>
    </div>

    <a class="btn" id="cta" href="https://t.me/Crysta1_VPNbot?start=paid" rel="noopener">
      Открыть Telegram
    </a>

    <div class="foot">Защищённое соединение · <b>Crystal VPN</b></div>
  </main>

<script>
  (function () {
    // Username бота: по умолчанию Crysta1_VPNbot, можно переопределить ?bot=...
    var DEFAULT_BOT = "Crysta1_VPNbot";
    var params = new URLSearchParams(window.location.search);
    var bot = (params.get("bot") || DEFAULT_BOT).replace(/[^A-Za-z0-9_]/g, "");

    var webLink = "https://t.me/" + bot + "?start=paid";
    var deepLink = "tg://resolve?domain=" + bot + "&start=paid";

    var cta = document.getElementById("cta");
    cta.setAttribute("href", webLink);

    // Внутри встроенного браузера Telegram (автопродление — оплата не уходит из
    // приложения) схема tg:// часто заблокирована, а сама страница висит
    // полуэкранно. Зато https-ссылку t.me Telegram перехватывает нативно,
    // закрывает встроенный браузер и возвращает в чат на весь экран — поэтому
    // в этом контексте сразу ведём на webLink. В системном браузере (разовая
    // оплата через СБП/банк) приоритет у tg:// — мгновенный возврат в приложение.
    var inTelegram = /Telegram/i.test(navigator.userAgent || "");
    try { window.location.replace(inTelegram ? webLink : deepLink); } catch (e) {}

    // Фоллбэк: если за ~1.4 с приложение не перехватило переход (десктоп, нет
    // Telegram, заблокированная схема) — «зажигаем» кнопку и меняем текст.
    setTimeout(function () {
      var hintText = document.getElementById("hint-text");
      var dots = document.getElementById("dots");
      if (dots) dots.style.display = "none";
      if (hintText) hintText.textContent = "Не открылось само? Нажми кнопку ниже:";
      cta.classList.add("ready");
      try { cta.focus({ preventScroll: true }); } catch (e) {}
    }, 1400);
  })();
</script>
</body>
</html>
